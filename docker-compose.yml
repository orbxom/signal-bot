services:
  signal-cli:
    build:
      context: ./signal-cli
    container_name: signal-cli
    environment:
      - BOT_PHONE_NUMBER=${BOT_PHONE_NUMBER}
    volumes:
      - ./data/signal-cli-config:/var/lib/signal-cli
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - bot-network

  bot:
    build:
      context: ./bot
    container_name: signal-family-bot
    depends_on:
      - signal-cli
    environment:
      - BOT_PHONE_NUMBER=${BOT_PHONE_NUMBER}
      - MENTION_TRIGGERS=${MENTION_TRIGGERS:-@bot}
      - CONTEXT_WINDOW_SIZE=${CONTEXT_WINDOW_SIZE:-20}
      - SIGNAL_CLI_URL=http://signal-cli:8080
      - DB_PATH=/app/data/bot.db
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-}
      - CLAUDE_MAX_TURNS=${CLAUDE_MAX_TURNS:-1}
      - BOT_TIMEZONE=${BOT_TIMEZONE:-Australia/Sydney}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - SOURCE_ROOT=/app/source
    volumes:
      - ./data/bot:/app/data
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.claude.json:/root/.claude.json:ro
      - ${HOME}/.config/gh:/root/.config/gh:ro
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
