<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dark Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-root: #0d1117;
      --bg-card: #161b22;
      --bg-card-hover: #1c2129;
      --border: #30363d;
      --border-hover: #484f58;
      --text: #e6edf3;
      --text-subtle: #8b949e;
      --text-dim: #484f58;

      --green: #3fb950;
      --blue: #58a6ff;
      --gray: #484f58;
      --yellow: #d29922;
      --red: #f85149;

      --green-glow: rgba(63, 185, 80, 0.15);
      --blue-glow: rgba(88, 166, 255, 0.15);
      --red-glow: rgba(248, 81, 73, 0.12);
      --yellow-glow: rgba(210, 153, 34, 0.12);

      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;

      --radius: 6px;
      --card-radius: 10px;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg-root);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle grid texture on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ---- HEADER ---- */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-family: var(--font-mono);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--blue) 0%, #388bfd 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.25);
    }

    .summary {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-subtle);
      letter-spacing: 0.3px;
    }

    .summary .count {
      color: var(--text);
      font-weight: 600;
    }

    .summary .active-count { color: var(--blue); }
    .summary .complete-count { color: var(--green); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ---- CONNECTION STATUS ---- */
    .conn-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-subtle);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .conn-dot.connected {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 4px rgba(63, 185, 80, 0.4); }
      50% { box-shadow: 0 0 10px rgba(63, 185, 80, 0.7); }
    }

    /* ---- GRID ---- */
    .grid {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    /* ---- CARD ---- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-1px);
    }

    .card.dimmed {
      opacity: 0.55;
    }

    .card.dimmed:hover {
      opacity: 0.8;
    }

    /* Active card top glow */
    .card.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
      animation: scan-line 3s ease-in-out infinite;
    }

    @keyframes scan-line {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .card-body {
      padding: 18px 20px 14px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-title {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.35;
      color: var(--text);
    }

    .card-title .issue-num {
      font-family: var(--font-mono);
      color: var(--text-subtle);
      font-weight: 500;
      font-size: 0.85rem;
    }

    .stage-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .stage-label.status-in-progress {
      color: var(--blue);
      background: var(--blue-glow);
    }

    .stage-label.status-complete {
      color: var(--green);
      background: var(--green-glow);
    }

    .stage-label.status-pending {
      color: var(--text-subtle);
      background: rgba(139, 148, 158, 0.1);
    }

    .stage-label.status-deferred {
      color: var(--yellow);
      background: var(--yellow-glow);
    }

    .stage-label.status-abandoned {
      color: var(--red);
      background: var(--red-glow);
    }

    /* ---- PIPELINE BAR ---- */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 14px;
    }

    .pipeline-segment {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--gray);
      transition: background 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .pipeline-segment.complete {
      background: var(--green);
      box-shadow: 0 0 4px rgba(63, 185, 80, 0.3);
    }

    .pipeline-segment.in-progress {
      background: var(--blue);
      box-shadow: 0 0 6px rgba(88, 166, 255, 0.4);
      animation: pulse-segment 1.8s ease-in-out infinite;
    }

    @keyframes pulse-segment {
      0%, 100% { opacity: 0.7; box-shadow: 0 0 4px rgba(88, 166, 255, 0.3); }
      50% { opacity: 1; box-shadow: 0 0 10px rgba(88, 166, 255, 0.6); }
    }

    .pipeline-segment.deferred {
      background: var(--yellow);
      box-shadow: 0 0 4px rgba(210, 153, 34, 0.3);
    }

    .pipeline-segment.abandoned {
      background: var(--red);
      box-shadow: 0 0 4px rgba(248, 81, 73, 0.3);
    }

    /* Stage labels under pipeline */
    .pipeline-labels {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }

    .pipeline-labels span {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1;
    }

    .pipeline-labels span.active-label {
      color: var(--text-subtle);
    }

    /* ---- CARD META ---- */
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-times {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      gap: 14px;
    }

    .card-times span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .expand-hint {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      transition: color 0.2s;
    }

    .card:hover .expand-hint {
      color: var(--text-subtle);
    }

    /* ---- DIARY PANEL ---- */
    .diary-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .diary-panel.open {
      max-height: 2000px;
    }

    .diary-content {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .diary-content pre {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.65;
      color: var(--text-subtle);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }

    /* Diary scrollbar */
    .diary-content::-webkit-scrollbar { width: 5px; }
    .diary-content::-webkit-scrollbar-track { background: transparent; }
    .diary-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .diary-content::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ---- EMPTY STATE ---- */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }

    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    /* ---- LOADING ---- */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    /* ---- ANIMATIONS ---- */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      animation: fade-in 0.35s ease-out both;
    }

    /* Stagger cards */
    .card:nth-child(1) { animation-delay: 0.02s; }
    .card:nth-child(2) { animation-delay: 0.06s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.14s; }
    .card:nth-child(5) { animation-delay: 0.18s; }
    .card:nth-child(6) { animation-delay: 0.22s; }
    .card:nth-child(7) { animation-delay: 0.26s; }
    .card:nth-child(8) { animation-delay: 0.30s; }
    .card:nth-child(9) { animation-delay: 0.34s; }
    .card:nth-child(10) { animation-delay: 0.38s; }
    .card:nth-child(11) { animation-delay: 0.42s; }
    .card:nth-child(12) { animation-delay: 0.46s; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      .header { padding: 12px 16px; flex-wrap: wrap; }
      .grid { padding: 16px; grid-template-columns: 1fr; gap: 12px; }
      .card-body { padding: 14px 16px 12px; }
      .pipeline-labels { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact@10';
    import { useState, useEffect, useCallback, useRef } from 'https://esm.sh/preact@10/hooks';
    import htm from 'https://esm.sh/htm@3';
    const html = htm.bind(h);

    // --- Constants ---
    const STAGE_ORDER = ['plan', 'build', 'test', 'simplify', 'pr', 'integration-test', 'review'];
    const STAGE_LABELS = {
      'plan': 'Plan',
      'build': 'Build',
      'test': 'Test',
      'simplify': 'Simplify',
      'pr': 'PR',
      'integration-test': 'Int-Test',
      'review': 'Review',
    };

    // --- Helpers ---
    function formatTime(iso) {
      if (!iso) return null;
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return null;
        const now = new Date();
        const diffMs = now - d;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHrs = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHrs < 24) return `${diffHrs}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
      } catch { return null; }
    }

    function isRunComplete(run) {
      const cs = run.status?.currentStage?.toLowerCase();
      if (cs === 'complete') return true;
      // Also check if all stages are complete/deferred
      const stages = run.status?.stages || {};
      return STAGE_ORDER.every(s => {
        const v = stages[s];
        return v === 'complete' || v === 'deferred';
      }) && Object.keys(stages).length > 0;
    }

    function isRunActive(run) {
      const stages = run.status?.stages || {};
      return STAGE_ORDER.some(s => stages[s] === 'in-progress');
    }

    function getCurrentStageLabel(run) {
      const cs = run.status?.currentStage;
      if (!cs) return 'Unknown';
      if (cs === 'complete') return 'Complete';
      if (cs === 'unknown') return 'Initializing';
      // Find in-progress stage for display
      const stages = run.status?.stages || {};
      for (const s of STAGE_ORDER) {
        if (stages[s] === 'in-progress') {
          return STAGE_LABELS[s] || s;
        }
      }
      return STAGE_LABELS[cs] || cs;
    }

    function getStageStatusClass(run) {
      const cs = run.status?.currentStage;
      if (cs === 'complete' || isRunComplete(run)) return 'status-complete';
      const stages = run.status?.stages || {};
      for (const s of STAGE_ORDER) {
        if (stages[s] === 'in-progress') return 'status-in-progress';
      }
      for (const s of STAGE_ORDER) {
        if (stages[s] === 'abandoned') return 'status-abandoned';
      }
      return 'status-pending';
    }

    function getSortKey(run) {
      // Most recently updated first
      const updatedAt = run.status?.updatedAt;
      const createdAt = run.event?.createdAt;
      if (updatedAt) return new Date(updatedAt).getTime();
      if (createdAt) return new Date(createdAt).getTime();
      return 0; // Fall back to 0, will be sorted alphabetically below
    }

    function sortRuns(runs) {
      return Object.values(runs).sort((a, b) => {
        const ka = getSortKey(a);
        const kb = getSortKey(b);
        if (ka === 0 && kb === 0) {
          return a.runId.localeCompare(b.runId);
        }
        return kb - ka; // Most recent first
      });
    }

    // --- ConnectionStatus ---
    function ConnectionStatus({ connected }) {
      return html`
        <div class="conn-status">
          <div class="conn-dot ${connected ? 'connected' : ''}"></div>
          <span>${connected ? 'Live' : 'Offline'}</span>
        </div>
      `;
    }

    // --- StageBar ---
    function StageBar({ stages }) {
      return html`
        <div class="pipeline">
          ${STAGE_ORDER.map(stage => {
            const status = (stages && stages[stage]) || 'pending';
            return html`<div key=${stage} class="pipeline-segment ${status}" title="${STAGE_LABELS[stage]}: ${status}"></div>`;
          })}
        </div>
        <div class="pipeline-labels">
          ${STAGE_ORDER.map(stage => {
            const status = (stages && stages[stage]) || 'pending';
            const isActive = status === 'in-progress' || status === 'complete' || status === 'deferred' || status === 'abandoned';
            return html`<span key=${stage} class="${isActive ? 'active-label' : ''}">${STAGE_LABELS[stage]}</span>`;
          })}
        </div>
      `;
    }

    // --- DiaryPanel ---
    function DiaryPanel({ diary, open }) {
      if (!diary) return null;
      return html`
        <div class="diary-panel ${open ? 'open' : ''}">
          <div class="diary-content">
            <pre>${diary}</pre>
          </div>
        </div>
      `;
    }

    // --- RunCard ---
    function RunCard({ run }) {
      const [expanded, setExpanded] = useState(false);
      const complete = isRunComplete(run);
      const active = isRunActive(run);

      const title = run.event?.title || run.runId;
      const issueNum = run.event?.issueNumber;
      const stageLabel = getCurrentStageLabel(run);
      const statusClass = getStageStatusClass(run);
      const createdAt = formatTime(run.event?.createdAt);
      const updatedAt = formatTime(run.status?.updatedAt);

      const cardClasses = [
        'card',
        complete ? 'dimmed' : '',
        active ? 'active' : '',
      ].filter(Boolean).join(' ');

      return html`
        <div class="${cardClasses}" onClick=${() => setExpanded(!expanded)}>
          <div class="card-body">
            <div class="card-header">
              <div class="card-title">
                ${issueNum ? html`<span class="issue-num">#${issueNum}</span>${' \u2014 '}` : ''}${title}
              </div>
              <span class="stage-label ${statusClass}">${stageLabel}</span>
            </div>

            <${StageBar} stages=${run.status?.stages} />

            <div class="card-meta">
              <div class="card-times">
                ${createdAt ? html`<span>Started ${createdAt}</span>` : ''}
                ${updatedAt ? html`<span>Updated ${updatedAt}</span>` : ''}
              </div>
              <span class="expand-hint">${expanded ? 'collapse' : 'diary'}</span>
            </div>
          </div>

          <${DiaryPanel} diary=${run.diary} open=${expanded} />
        </div>
      `;
    }

    // --- App ---
    function App() {
      const [runs, setRuns] = useState(null);
      const [connected, setConnected] = useState(false);
      const wsRef = useRef(null);
      const retryRef = useRef(2000);

      const connect = useCallback(() => {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${proto}//${window.location.host}`;

        try {
          const ws = new WebSocket(url);
          wsRef.current = ws;

          ws.onopen = () => {
            setConnected(true);
            retryRef.current = 2000; // Reset backoff
          };

          ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);

              if (msg.type === 'snapshot') {
                setRuns(msg.runs || {});
              } else if (msg.type === 'update') {
                setRuns(prev => {
                  if (!prev) return prev;
                  const existing = prev[msg.runId] || {
                    runId: msg.runId,
                    event: { title: msg.runId },
                    status: { runId: msg.runId, currentStage: 'unknown', stages: {} },
                    diary: '',
                  };
                  const updated = { ...existing };

                  if (msg.file === 'status') {
                    updated.status = msg.data;
                  } else if (msg.file === 'event') {
                    updated.event = msg.data;
                  } else if (msg.file === 'diary') {
                    updated.diary = msg.data;
                  }

                  return { ...prev, [msg.runId]: updated };
                });
              }
            } catch (e) {
              console.error('Failed to parse WebSocket message:', e);
            }
          };

          ws.onclose = () => {
            setConnected(false);
            wsRef.current = null;
            // Auto-reconnect with backoff
            const delay = retryRef.current;
            retryRef.current = Math.min(delay * 1.5, 10000);
            setTimeout(connect, delay);
          };

          ws.onerror = () => {
            // onclose will fire after this
          };
        } catch (e) {
          console.error('WebSocket connection failed:', e);
          const delay = retryRef.current;
          retryRef.current = Math.min(delay * 1.5, 10000);
          setTimeout(connect, delay);
        }
      }, []);

      useEffect(() => {
        connect();
        return () => {
          if (wsRef.current) {
            wsRef.current.onclose = null; // Prevent reconnect on unmount
            wsRef.current.close();
          }
        };
      }, [connect]);

      const [, setTick] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 30000);
        return () => clearInterval(id);
      }, []);

      // Compute summary
      const runList = runs ? sortRuns(runs) : [];
      const totalCount = runList.length;
      const activeCount = runList.filter(isRunActive).length;
      const completeCount = runList.filter(isRunComplete).length;

      return html`
        <div class="header">
          <div class="header-left">
            <div class="logo">
              <div class="logo-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M2 4L8 1L14 4V12L8 15L2 12V4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                  <path d="M2 4L8 7M8 7L14 4M8 7V15" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
              </div>
              Dark Factory
            </div>
            ${runs !== null && html`
              <div class="summary">
                <span class="count">${totalCount}</span> runs:${' '}
                <span class="active-count">${activeCount}</span> active,${' '}
                <span class="complete-count">${completeCount}</span> complete
              </div>
            `}
          </div>
          <div class="header-right">
            <${ConnectionStatus} connected=${connected} />
          </div>
        </div>

        <div class="grid">
          ${runs === null && html`
            <div class="loading">
              <div class="loading-spinner"></div>
              <div class="loading-text">Connecting to factory...</div>
            </div>
          `}

          ${runs !== null && totalCount === 0 && html`
            <div class="empty-state">
              <div class="empty-icon">///</div>
              <div>No factory runs found</div>
            </div>
          `}

          ${runList.map(run => html`<${RunCard} key=${run.runId} run=${run} />`)}
        </div>
      `;
    }

    // --- Mount ---
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
